<!-- Contact Form Component -->
<div class="form-section" id="contact-form">
  <div class="form-container">
    <div class="animated-line horizontal blue top"></div>

    <div class="form-header">
      <h2>Kontaktieren Sie uns</h2>
      <p>
        Haben Sie Fragen oder möchten Sie ein Angebot erhalten? Wir freuen uns
        auf Ihre Nachricht!
      </p>
    </div>

    <form
      action="https://formspree.io/f/xzdwljqb"
      method="POST"
      class="contact-form"
    >
      <div class="form-row">
        <div class="form-group">
          <label for="name">Name *</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            placeholder="Ihr Name"
          />
        </div>

        <div class="form-group">
          <label for="company">Firma</label>
          <input
            type="text"
            id="company"
            name="company"
            placeholder="Ihr Firmenname (optional)"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email">E-Mail *</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="ihre.email@beispiel.at"
          />
        </div>

        <div class="form-group">
          <label for="phone">Telefon</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="+43 XXX XXX XXX"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="interest">Interesse</label>
        <select id="interest" name="interest">
          <option value="">Bitte wählen...</option>
          <option value="lichtwerbung">Lichtwerbung</option>
          <option value="einzelbuchstaben">Einzelbuchstaben</option>
          <option value="leuchtkasten">Leuchtkasten</option>
          <option value="schilder">Schilder</option>
          <option value="folie">Fenster- & Objektbeklebung</option>
          <option value="metalltechnik">Metalltechnik</option>
          <option value="beratung">Allgemeine Beratung</option>
          <option value="sonstiges">Sonstiges</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Nachricht *</label>
        <textarea
          id="message"
          name="message"
          required
          placeholder="Beschreiben Sie Ihr Projekt oder Ihre Anfrage..."
        ></textarea>
      </div>

      <button type="submit" class="submit-btn">
        Nachricht senden <i class="fa fa-paper-plane"></i>
      </button>
    </form>

    <div class="animated-line horizontal red bottom"></div>
  </div>
</div>
